<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <!-- Background -->
  <rect width="800" height="800" rx="120" fill="#0a0a0a"/>

  <!-- Gold border frame -->
  <rect x="50" y="50" width="700" height="700" rx="90" fill="none" stroke="#d4a853" stroke-width="5"/>

  <!-- Dollar sign accent (subtle) -->
  <text x="400" y="280" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-size="80" fill="#d4a853" opacity="0.15">$$$</text>

  <!-- Main B monogram -->
  <text x="400" y="370" text-anchor="middle" font-family="Georgia,serif" font-weight="900" font-style="italic" font-size="260" fill="#d4a853">B</text>

  <!-- Divider line -->
  <line x1="180" y1="430" x2="620" y2="430" stroke="#d4a853" stroke-width="2" opacity="0.6"/>

  <!-- BLOW YOUR -->
  <text x="400" y="510" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="52" fill="#f5f5f5" letter-spacing="12">BLOW YOUR</text>

  <!-- SAVINGS -->
  <text x="400" y="580" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-style="italic" font-size="52" fill="#d4a853" letter-spacing="12">SAVINGS</text>

  <!-- Bottom divider -->
  <line x1="180" y1="610" x2="620" y2="610" stroke="#d4a853" stroke-width="2" opacity="0.4"/>

  <!-- Tagline -->
  <text x="400" y="660" text-anchor="middle" font-family="Georgia,serif" font-weight="400" font-style="italic" font-size="20" fill="#737373" letter-spacing="6">LUXURY CURATED</text>
</svg>
